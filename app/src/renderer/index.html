<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' ws:;" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Reroll Review</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #000000;
        color: #ffffff;
        font-family: 'IBM Plex Sans', sans-serif;
      }
      a {
        color: #ffc808;
        text-decoration: none;
      }
      a:hover {
        color: #ffd84d;
        text-decoration: underline;
      }
      * {
        box-sizing: border-box;
      }
      input:focus,
      textarea:focus,
      select:focus {
        border-color: #ffc808 !important;
      }
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: #2b2f33;
        border-radius: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      input[type='date']::-webkit-calendar-picker-indicator {
        filter: invert(0.7);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
